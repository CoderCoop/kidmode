name: Build packaged apps

# Produces installable/runnable app packages as downloadable CI artifacts.
#
#   Android:
#     - always: a release APK (debug-signed by default)
#     - if ANDROID_KEYSTORE_BASE64 (+ friends) secrets are set: a properly
#       release-signed APK
#   iOS:
#     - default: an unsigned Simulator .app
#     - if IOS_CERTIFICATE_BASE64 (+ friends) secrets are set: a signed device
#       .ipa produced via xcodebuild archive + -exportArchive
#
# See docs/RELEASE_SIGNING.md for the exact secret names/values. A fast `checks`
# gate (typecheck + lint + unit tests) runs first; the native builds follow.

on:
  push:
    branches: ['**']
  pull_request:
  workflow_dispatch:

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    name: Type-check, lint, test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm test -- --ci

  android:
    name: Android APK
    needs: checks
    runs-on: ubuntu-latest
    # Surfaced as env so steps can gate on "is a keystore secret configured?".
    env:
      ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Install NDK + CMake (pinned to the RN template versions)
        run: |
          yes | sdkmanager --licenses >/dev/null || true
          sdkmanager "platforms;android-35" "build-tools;35.0.0" \
                     "ndk;26.1.10909125" "cmake;3.22.1"

      - run: npm ci

      - name: Configure release signing (only if secrets are set)
        if: env.ANDROID_KEYSTORE_BASE64 != ''
        env:
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
        run: |
          echo "$ANDROID_KEYSTORE_BASE64" | base64 -d > android/app/release.keystore
          cat >> android/gradle.properties <<EOF
          KIDMODE_UPLOAD_STORE_FILE=release.keystore
          KIDMODE_UPLOAD_STORE_PASSWORD=$ANDROID_KEYSTORE_PASSWORD
          KIDMODE_UPLOAD_KEY_ALIAS=$ANDROID_KEY_ALIAS
          KIDMODE_UPLOAD_KEY_PASSWORD=$ANDROID_KEY_PASSWORD
          EOF

      - name: Gradle cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: gradle-${{ runner.os }}-${{ hashFiles('android/**/*.gradle*', 'android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: gradle-${{ runner.os }}-

      - name: Assemble release APK
        working-directory: android
        run: ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: kidmode-android-apk
          path: android/app/build/outputs/apk/release/*.apk
          if-no-files-found: error

  ios:
    name: iOS app
    needs: checks
    runs-on: macos-14
    env:
      HOMEBREW_NO_INSTALL_CLEANUP: '1'
      # Surfaced so steps can gate on "are signing secrets configured?".
      IOS_CERTIFICATE_BASE64: ${{ secrets.IOS_CERTIFICATE_BASE64 }}
      APPSTORE_API_KEY_ID: ${{ secrets.APPSTORE_API_KEY_ID }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Select Xcode
        run: sudo xcode-select -s /Applications/Xcode_15.4.app

      - run: npm ci

      - name: Install CocoaPods deps
        working-directory: ios
        run: |
          bundle install
          bundle exec pod install

      # ---- Unsigned path (default: no signing secrets) --------------------
      - name: Build unsigned Simulator app
        if: env.IOS_CERTIFICATE_BASE64 == ''
        working-directory: ios
        run: |
          xcodebuild \
            -workspace KidMode.xcworkspace \
            -scheme KidMode \
            -configuration Release \
            -sdk iphonesimulator \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            build

      - name: Package Simulator .app
        if: env.IOS_CERTIFICATE_BASE64 == ''
        working-directory: ios
        run: |
          APP=$(find build/Build/Products -name 'KidMode.app' -maxdepth 3 | head -1)
          echo "Found app at: $APP"; test -n "$APP"
          ditto -c -k --sequesterRsrc --keepParent "$APP" KidMode-simulator.app.zip

      - name: Upload Simulator app
        if: env.IOS_CERTIFICATE_BASE64 == ''
        uses: actions/upload-artifact@v4
        with:
          name: kidmode-ios-simulator-app
          path: ios/KidMode-simulator.app.zip
          if-no-files-found: error

      # ---- Signed path (signing secrets present) --------------------------
      - name: Import signing assets
        if: env.IOS_CERTIFICATE_BASE64 != ''
        env:
          IOS_CERTIFICATE_PASSWORD: ${{ secrets.IOS_CERTIFICATE_PASSWORD }}
          IOS_PROVISION_PROFILE_BASE64: ${{ secrets.IOS_PROVISION_PROFILE_BASE64 }}
        run: |
          KEYCHAIN="$RUNNER_TEMP/app.keychain-db"
          KEYCHAIN_PWD="$(openssl rand -base64 24)"
          security create-keychain -p "$KEYCHAIN_PWD" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PWD" "$KEYCHAIN"
          echo "$IOS_CERTIFICATE_BASE64" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" -P "$IOS_CERTIFICATE_PASSWORD" \
            -A -t cert -f pkcs12 -k "$KEYCHAIN"
          security list-keychain -d user -s "$KEYCHAIN" login.keychain-db
          security set-key-partition-list -S apple-tool:,apple: -k "$KEYCHAIN_PWD" "$KEYCHAIN" >/dev/null
          PROFILES="$HOME/Library/MobileDevice/Provisioning Profiles"
          mkdir -p "$PROFILES"
          echo "$IOS_PROVISION_PROFILE_BASE64" | base64 --decode > "$PROFILES/kidmode.mobileprovision"

      - name: Write ExportOptions.plist
        if: env.IOS_CERTIFICATE_BASE64 != ''
        working-directory: ios
        env:
          IOS_TEAM_ID: ${{ secrets.IOS_TEAM_ID }}
          IOS_EXPORT_METHOD: ${{ secrets.IOS_EXPORT_METHOD }}
        run: |
          # Default to app-store so the exported .ipa is TestFlight-ready.
          # Override with IOS_EXPORT_METHOD=ad-hoc / development for
          # device-installable (non-store) builds.
          METHOD="${IOS_EXPORT_METHOD:-app-store}"
          cat > ExportOptions.plist <<EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key><string>${METHOD}</string>
            <key>teamID</key><string>${IOS_TEAM_ID}</string>
            <key>signingStyle</key><string>manual</string>
            <key>compileBitcode</key><false/>
            <key>stripSwiftSymbols</key><true/>
          </dict>
          </plist>
          EOF

      - name: Archive + export signed .ipa
        if: env.IOS_CERTIFICATE_BASE64 != ''
        working-directory: ios
        env:
          IOS_TEAM_ID: ${{ secrets.IOS_TEAM_ID }}
          IOS_PROVISION_PROFILE_NAME: ${{ secrets.IOS_PROVISION_PROFILE_NAME }}
          IOS_CODE_SIGN_IDENTITY: ${{ secrets.IOS_CODE_SIGN_IDENTITY }}
        run: |
          xcodebuild archive \
            -workspace KidMode.xcworkspace \
            -scheme KidMode \
            -configuration Release \
            -sdk iphoneos \
            -archivePath "$RUNNER_TEMP/KidMode.xcarchive" \
            CODE_SIGN_STYLE=Manual \
            DEVELOPMENT_TEAM="$IOS_TEAM_ID" \
            PROVISIONING_PROFILE_SPECIFIER="$IOS_PROVISION_PROFILE_NAME" \
            CODE_SIGN_IDENTITY="${IOS_CODE_SIGN_IDENTITY:-Apple Distribution}"
          xcodebuild -exportArchive \
            -archivePath "$RUNNER_TEMP/KidMode.xcarchive" \
            -exportPath "$RUNNER_TEMP/export" \
            -exportOptionsPlist ExportOptions.plist

      - name: Upload signed .ipa
        if: env.IOS_CERTIFICATE_BASE64 != ''
        uses: actions/upload-artifact@v4
        with:
          name: kidmode-ios-ipa
          path: ${{ runner.temp }}/export/*.ipa
          if-no-files-found: error

      # ---- Optional: ship the .ipa to TestFlight / App Store Connect -------
      # Runs only when both iOS signing AND an App Store Connect API key are
      # configured. Requires the export method to be app-store (the default).
      - name: Upload to TestFlight
        if: env.IOS_CERTIFICATE_BASE64 != '' && env.APPSTORE_API_KEY_ID != ''
        env:
          APPSTORE_API_KEY_ID: ${{ secrets.APPSTORE_API_KEY_ID }}
          APPSTORE_API_ISSUER_ID: ${{ secrets.APPSTORE_API_ISSUER_ID }}
          APPSTORE_API_KEY_BASE64: ${{ secrets.APPSTORE_API_KEY_BASE64 }}
        run: |
          mkdir -p ~/.appstoreconnect/private_keys
          echo "$APPSTORE_API_KEY_BASE64" | base64 --decode \
            > ~/.appstoreconnect/private_keys/AuthKey_${APPSTORE_API_KEY_ID}.p8
          IPA=$(find "$RUNNER_TEMP/export" -name '*.ipa' | head -1)
          echo "Uploading $IPA to App Store Connect / TestFlight"
          xcrun altool --upload-app --type ios --file "$IPA" \
            --apiKey "$APPSTORE_API_KEY_ID" \
            --apiIssuer "$APPSTORE_API_ISSUER_ID"
